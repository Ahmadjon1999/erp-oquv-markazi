{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2 class="mb-4">Vazifalar ro'yxati</h2>
    <div class="row">
        {% for assignment in assignments %}
        <div class="col-md-6 mb-3">
            <div class="card border shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ assignment.title }}</h5>
                    <p class="card-text text-muted">{{ assignment.description }}</p>
                    <p class="text-danger small font-weight-bold">Muddati: {{ assignment.deadline }}</p>
                    <a href="{% url 'submit_assignment' assignment.id %}" class="btn btn-primary btn-sm">Vazifani topshirish</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
