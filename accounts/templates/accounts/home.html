<!DOCTYPE html>

<head>

                    <p class="text-muted small">

                    </p>
                    <div class="mt-4">
                        <a href="/admin/" class="btn btn-outline-secondary px-4 py-2 fw-semibold">Django Admin panelga o'tish</a>
